<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="iconBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B7FF0"/>
      <stop offset="100%" stop-color="#5148C8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="32" fill="url(#iconBg)"/>

  <!-- Spreadsheet / CSV table -->
  <rect x="30" y="44" width="134" height="168" rx="10" fill="none" stroke="white" stroke-width="11"/>
  <!-- Header row separator -->
  <line x1="30" y1="94" x2="164" y2="94" stroke="white" stroke-width="11"/>
  <!-- Data row separators -->
  <line x1="30" y1="132" x2="164" y2="132" stroke="white" stroke-width="9"/>
  <line x1="30" y1="168" x2="164" y2="168" stroke="white" stroke-width="9"/>
  <!-- Column divider -->
  <line x1="97" y1="94" x2="97" y2="212" stroke="white" stroke-width="9"/>

  <!-- Export: arrow pointing up -->
  <line x1="213" y1="84" x2="213" y2="122" stroke="white" stroke-width="11" stroke-linecap="round"/>
  <polyline points="194,90 213,62 232,90" fill="none" stroke="white" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Import: arrow pointing down -->
  <line x1="213" y1="140" x2="213" y2="178" stroke="white" stroke-width="11" stroke-linecap="round"/>
  <polyline points="194,172 213,200 232,172" fill="none" stroke="white" stroke-width="11" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
