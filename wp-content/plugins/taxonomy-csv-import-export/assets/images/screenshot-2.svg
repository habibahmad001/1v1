<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
<defs>
  <linearGradient id="hg" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#7164e6"/>
    <stop offset="100%" stop-color="#9580ff"/>
  </linearGradient>
</defs>

<!-- Admin bar -->
<rect width="900" height="32" fill="#1d2327"/>
<circle cx="16" cy="16" r="7" fill="none" stroke="#a0a5aa" stroke-width="1.5"/>
<text x="12" y="21" font-family="Georgia,serif" font-size="11" font-weight="bold" fill="#c9d3dc">W</text>
<text x="34" y="21" font-family="-apple-system,BlinkMacSystemFont,Arial,sans-serif" font-size="13" fill="#a0a5aa">My WordPress</text>
<text x="795" y="21" font-family="-apple-system,BlinkMacSystemFont,Arial,sans-serif" font-size="12" fill="#a0a5aa">Howdy, Admin</text>

<!-- Sidebar -->
<rect x="0" y="32" width="160" height="468" fill="#23282d"/>
<text x="38" y="66" font-family="-apple-system,Arial,sans-serif" font-size="12.5" fill="#a0a5aa">Dashboard</text>
<text x="38" y="91" font-family="-apple-system,Arial,sans-serif" font-size="12.5" fill="#a0a5aa">Posts</text>
<text x="38" y="116" font-family="-apple-system,Arial,sans-serif" font-size="12.5" fill="#a0a5aa">Media</text>
<text x="38" y="141" font-family="-apple-system,Arial,sans-serif" font-size="12.5" fill="#a0a5aa">Plugins</text>
<text x="38" y="166" font-family="-apple-system,Arial,sans-serif" font-size="12.5" fill="#a0a5aa">Settings</text>
<rect x="14" y="176" width="132" height="1" fill="#3c434a"/>
<rect x="0" y="182" width="160" height="28" fill="#0073aa"/>
<text x="38" y="200" font-family="-apple-system,Arial,sans-serif" font-size="12.5" fill="white" font-weight="600">Taxonomy CSV</text>
<rect x="0" y="210" width="160" height="98" fill="#2c3338"/>
<rect x="0" y="210" width="3" height="24" fill="#72aee6"/>
<rect x="0" y="210" width="160" height="24" fill="#32373c"/>
<text x="46" y="226" font-family="-apple-system,Arial,sans-serif" font-size="12" fill="white">Import / Export</text>
<text x="46" y="250" font-family="-apple-system,Arial,sans-serif" font-size="12" fill="#a0a5aa">Create Term</text>
<text x="46" y="274" font-family="-apple-system,Arial,sans-serif" font-size="12" fill="#a0a5aa">Register Taxonomy</text>
<text x="46" y="298" font-family="-apple-system,Arial,sans-serif" font-size="12" fill="#a0a5aa">Users</text>

<!-- Content background -->
<rect x="160" y="32" width="740" height="468" fill="#f0f0f1"/>
<text x="180" y="62" font-family="-apple-system,Arial,sans-serif" font-size="22" font-weight="600" fill="#1d2327">Taxonomy CSV Import Export</text>

<!-- Card -->
<rect x="182" y="73" width="700" height="414" rx="3" fill="#dcdcde"/>
<rect x="180" y="71" width="700" height="414" rx="3" fill="white"/>
<rect x="180" y="71" width="700" height="8" rx="3" fill="url(#hg)"/>

<!-- Page header -->
<text x="200" y="102" font-family="-apple-system,Arial,sans-serif" font-size="15" font-weight="700" fill="#1d2327">Import / Export Taxonomy</text>
<text x="200" y="119" font-family="-apple-system,Arial,sans-serif" font-size="12" fill="#646970">Export any registered taxonomy to CSV, or import terms from a CSV file.</text>

<!-- Pill tabs — Import active -->
<rect x="200" y="130" width="108" height="28" rx="14" fill="#f6f7f7" stroke="#dcdcde" stroke-width="1"/>
<text x="254" y="148" text-anchor="middle" font-family="-apple-system,Arial,sans-serif" font-size="12.5" fill="#50575e">Export CSV</text>
<rect x="314" y="130" width="108" height="28" rx="14" fill="#7164e6"/>
<text x="368" y="148" text-anchor="middle" font-family="-apple-system,Arial,sans-serif" font-size="12.5" fill="white" font-weight="500">Import CSV</text>

<rect x="200" y="168" width="640" height="1" fill="#f0f0f1"/>

<!-- Import panel -->
<text x="200" y="192" font-family="-apple-system,Arial,sans-serif" font-size="13" font-weight="600" fill="#1d2327">Select CSV File</text>
<!-- File upload box -->
<rect x="200" y="200" width="400" height="72" rx="4" fill="#f6f7f7" stroke="#8c8f94" stroke-width="1" stroke-dasharray="5,3"/>
<text x="400" y="230" text-anchor="middle" font-family="-apple-system,Arial,sans-serif" font-size="13" fill="#50575e">Choose a CSV file to import</text>
<rect x="340" y="242" width="120" height="24" rx="3" fill="white" stroke="#8c8f94" stroke-width="1"/>
<text x="400" y="258" text-anchor="middle" font-family="-apple-system,Arial,sans-serif" font-size="12" fill="#1d2327">Browse File</text>

<!-- Import button -->
<rect x="200" y="284" width="110" height="30" rx="3" fill="#7164e6"/>
<text x="255" y="303" text-anchor="middle" font-family="-apple-system,Arial,sans-serif" font-size="13" fill="white">Import CSV</text>

<!-- Success notice -->
<rect x="200" y="326" width="640" height="34" rx="3" fill="#edfaef" stroke="#00a32a" stroke-width="1"/>
<rect x="200" y="326" width="4" height="34" rx="2" fill="#00a32a"/>
<text x="218" y="347" font-family="-apple-system,Arial,sans-serif" font-size="13" fill="#1d2327">&#10003; Import complete — <tspan font-weight="700">5 terms</tspan> imported successfully into <tspan font-weight="700">category</tspan>.</text>

<!-- Imported data table -->
<text x="200" y="382" font-family="-apple-system,Arial,sans-serif" font-size="13" font-weight="700" fill="#1d2327">Imported Terms</text>
<rect x="200" y="390" width="640" height="24" rx="2" fill="#f6f7f7" stroke="#dcdcde" stroke-width="1"/>
<text x="214" y="406" font-family="-apple-system,Arial,sans-serif" font-size="12" font-weight="700" fill="#1d2327">#</text>
<text x="238" y="406" font-family="-apple-system,Arial,sans-serif" font-size="12" font-weight="700" fill="#1d2327">Name</text>
<text x="400" y="406" font-family="-apple-system,Arial,sans-serif" font-size="12" font-weight="700" fill="#1d2327">Slug</text>
<text x="560" y="406" font-family="-apple-system,Arial,sans-serif" font-size="12" font-weight="700" fill="#1d2327">Status</text>

<rect x="200" y="414" width="640" height="22" fill="white" stroke="#dcdcde" stroke-width="0.5"/>
<text x="214" y="429" font-family="-apple-system,Arial,sans-serif" font-size="12" fill="#1d2327">1</text>
<text x="238" y="429" font-family="-apple-system,Arial,sans-serif" font-size="12" fill="#1d2327">Uncategorized</text>
<text x="400" y="429" font-family="-apple-system,Arial,sans-serif" font-size="12" fill="#1d2327">uncategorized</text>
<rect x="554" y="418" width="52" height="16" rx="8" fill="#edfaef"/>
<text x="580" y="430" text-anchor="middle" font-family="-apple-system,Arial,sans-serif" font-size="11" fill="#00a32a">Created</text>

<rect x="200" y="436" width="640" height="22" fill="#f6f7f7" stroke="#dcdcde" stroke-width="0.5"/>
<text x="214" y="451" font-family="-apple-system,Arial,sans-serif" font-size="12" fill="#1d2327">2</text>
<text x="238" y="451" font-family="-apple-system,Arial,sans-serif" font-size="12" fill="#1d2327">Tutorials</text>
<text x="400" y="451" font-family="-apple-system,Arial,sans-serif" font-size="12" fill="#1d2327">tutorials</text>
<rect x="554" y="440" width="52" height="16" rx="8" fill="#edfaef"/>
<text x="580" y="452" text-anchor="middle" font-family="-apple-system,Arial,sans-serif" font-size="11" fill="#00a32a">Created</text>

</svg>
