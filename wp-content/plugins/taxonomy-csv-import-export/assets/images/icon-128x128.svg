<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="iconBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B7FF0"/>
      <stop offset="100%" stop-color="#5148C8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="16" fill="url(#iconBg)"/>

  <!-- Spreadsheet / CSV table -->
  <rect x="15" y="22" width="67" height="84" rx="5" fill="none" stroke="white" stroke-width="5.5"/>
  <!-- Header row separator -->
  <line x1="15" y1="47" x2="82" y2="47" stroke="white" stroke-width="5.5"/>
  <!-- Data row separators -->
  <line x1="15" y1="66" x2="82" y2="66" stroke="white" stroke-width="4.5"/>
  <line x1="15" y1="84" x2="82" y2="84" stroke="white" stroke-width="4.5"/>
  <!-- Column divider -->
  <line x1="49" y1="47" x2="49" y2="106" stroke="white" stroke-width="4.5"/>

  <!-- Export: arrow pointing up -->
  <line x1="106" y1="42" x2="106" y2="61" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <polyline points="96,46 106,31 116,46" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Import: arrow pointing down -->
  <line x1="106" y1="70" x2="106" y2="89" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
  <polyline points="96,85 106,100 116,85" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
