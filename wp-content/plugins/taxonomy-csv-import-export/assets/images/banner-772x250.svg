<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 772 250">
  <defs>
    <linearGradient id="bannerBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4A3FBF"/>
      <stop offset="50%" stop-color="#7164e6"/>
      <stop offset="100%" stop-color="#9580FF"/>
    </linearGradient>
    <linearGradient id="bannerBgV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00000022"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="772" height="250" fill="url(#bannerBg)"/>
  <rect width="772" height="250" fill="url(#bannerBgV)"/>

  <!-- Decorative circle accents -->
  <circle cx="700" cy="-20" r="130" fill="white" fill-opacity="0.06"/>
  <circle cx="750" cy="260" r="110" fill="white" fill-opacity="0.05"/>
  <circle cx="30" cy="240" r="80" fill="white" fill-opacity="0.04"/>

  <!-- ── Icon (left pad) ────────────────────────────────── -->
  <!-- Spreadsheet -->
  <rect x="48" y="46" width="94" height="114" rx="7" fill="none" stroke="white" stroke-width="7"/>
  <line x1="48" y1="76" x2="142" y2="76" stroke="white" stroke-width="7"/>
  <line x1="48" y1="104" x2="142" y2="104" stroke="white" stroke-width="7"/>
  <line x1="48" y1="130" x2="142" y2="130" stroke="white" stroke-width="7"/>
  <line x1="95" y1="76" x2="95" y2="160" stroke="white" stroke-width="7"/>

  <!-- Export arrow (up) -->
  <line x1="170" y1="62" x2="170" y2="92" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <polyline points="155,68 170,48 185,68" fill="none" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Import arrow (down) -->
  <line x1="170" y1="108" x2="170" y2="138" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <polyline points="155,132 170,152 185,132" fill="none" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ── Text ─────────────────────────────────────────── -->
  <text x="222" y="104" font-family="'Segoe UI',Arial,Helvetica,sans-serif" font-size="40" font-weight="700" fill="white" letter-spacing="-0.5">Taxonomy CSV</text>
  <text x="222" y="152" font-family="'Segoe UI',Arial,Helvetica,sans-serif" font-size="40" font-weight="700" fill="white" letter-spacing="-0.5">Import Export</text>
  <text x="224" y="186" font-family="'Segoe UI',Arial,Helvetica,sans-serif" font-size="15" fill="rgba(255,255,255,0.82)" letter-spacing="0.1">Manage WordPress taxonomies &amp; users via CSV — fast and effortlessly.</text>

  <!-- ── "WordPress Plugin" badge ───────────────────── -->
  <rect x="584" y="94" width="152" height="62" rx="10" fill="rgba(255,255,255,0.13)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <text x="660" y="120" text-anchor="middle" font-family="'Segoe UI',Arial,Helvetica,sans-serif" font-size="11" fill="rgba(255,255,255,0.75)" letter-spacing="1.2">WORDPRESS</text>
  <text x="660" y="142" text-anchor="middle" font-family="'Segoe UI',Arial,Helvetica,sans-serif" font-size="17" font-weight="600" fill="white">Plugin</text>
</svg>
